<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANSH JAGLAN || DOM TUTORIAL</title>
</head>
<body style="background-color: rgb(4, 4, 4); color: aliceblue;">
    <ul class="language" >
        <li >JavaScript</li>
        
    </ul>
</body>
<script>

    ////  In this function we need to traverse complete tree
    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`;
        document.querySelector('.language').appendChild(li)
    }
        addLanguage("JAVA");
        addLanguage("Python");
    
/////==================This is more optipimized way ================/////   
    //// because in this we dont need to traverse whole tree     
    function addLanguage(langName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName));
        document.querySelector('.language').appendChild(li)

    }
        addLanguage("golang")


////=================EDIT LIST==========////////////
    const secondLang = document.querySelector("li:nth-child(2)")
        
    const newLi = document.createElement('li')

    newLi.textContent = "Kotlin"
    secondLang.replaceWith(newLi)

    const thirdLang = document.querySelector("li:nth-child(3)")
    const newLi1 = document.createElement('li')
    newLi1.textContent = "Mojo"
    thirdLang.replaceWith(newLi1)



///////===========remove=================/////////
        const lastLang = document.querySelector('li:last-child')
        lastLang.remove()

</script>
</html>
